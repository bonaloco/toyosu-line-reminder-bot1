<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>整形当番bot 管理</title>
<style>
  :root {
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --surface-2: #F1F5F9;
    --text: #0F172A;
    --text-sub: #64748B;
    --border: #E2E8F0;
    --accent: #0D9488;
    --accent-weak: #CCFBF1;
    --ok: #16A34A;
    --ok-bg: #DCFCE7;
    --warn: #D97706;
    --warn-bg: #FEF3C7;
    --error: #DC2626;
    --error-bg: #FEE2E2;
    --shadow: 0 1px 3px rgb(0 0 0 / .08);
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0F172A;
      --surface: #1E293B;
      --surface-2: #283548;
      --text: #E2E8F0;
      --text-sub: #94A3B8;
      --border: #334155;
      --accent: #2DD4BF;
      --accent-weak: #134E4A;
      --ok: #4ADE80;
      --ok-bg: #14532D;
      --warn: #FBBF24;
      --warn-bg: #451A03;
      --error: #F87171;
      --error-bg: #450A0A;
      --shadow: 0 1px 3px rgb(0 0 0 / .4);
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.6;
    padding-bottom: env(safe-area-inset-bottom);
  }
  main { max-width: 640px; margin: 0 auto; padding: 12px 16px 48px; display: grid; gap: 16px; }

  /* ── ヘッダー ── */
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: 14px 16px 10px;
    display: flex; align-items: center; justify-content: space-between;
    max-width: 640px; margin: 0 auto;
  }
  header h1 { font-size: clamp(1.1rem, 4vw, 1.4rem); font-weight: 700; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text-sub); display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent; padding: 0;
  }
  .icon-btn:active { opacity: .7; }
  .icon-btn.spinning svg { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .health {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: .85rem; font-weight: 600;
    padding: 6px 12px; border-radius: 999px;
    background: var(--surface-2); color: var(--text-sub);
  }
  .health .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text-sub); }
  .health.ok    { background: var(--ok-bg); color: var(--ok); }
  .health.ok .dot { background: var(--ok); }
  .health.error { background: var(--error-bg); color: var(--error); }
  .health.error .dot { background: var(--error); }

  /* ── カード共通 ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
  }
  .card h2 {
    font-size: .85rem; font-weight: 700; color: var(--text-sub);
    letter-spacing: .05em; margin-bottom: 12px;
  }

  /* ── ① 今日カード ── */
  /* タイトル行: 左に見出し、右に配信バッジ(今日)or「今日に戻る」(他の日)。高さ固定 */
  .card-title-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; min-height: 44px; margin-bottom: 4px;
  }
  .card-title-row h2 { margin-bottom: 0; }
  /* 日付行: ‹ 日付 › の右に登録状況チップ。高さ固定 */
  .today-head { display: flex; align-items: center; gap: 10px; min-height: 44px; margin-bottom: 12px; }
  .reg-badge {
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; flex-shrink: 0;
  }
  .reg-badge.ok {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--ok-bg); color: var(--ok); font-size: 1rem;
  }
  .reg-badge.warn {
    min-height: 28px; padding: 3px 12px; border-radius: 999px;
    background: var(--warn-bg); color: var(--warn); font-size: .78rem;
  }
  .day-nav { display: flex; align-items: center; gap: 2px; margin-left: -10px; }
  .nav-arrow {
    width: 40px; height: 44px; background: none; border: none;
    color: var(--text-sub); font-size: 1.7rem; line-height: 1; padding: 0 0 4px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .nav-arrow:active { color: var(--accent); }
  .today-date { font-size: 1.3rem; font-weight: 700; }
  .back-today {
    min-height: 32px; padding: 3px 12px;
    border-radius: 999px; border: none;
    background: var(--accent-weak); color: var(--accent);
    font-size: .8rem; font-weight: 700; cursor: pointer; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: .82rem; font-weight: 700;
    min-height: 44px; padding: 5px 14px; border-radius: 999px;
  }
  .badge.ok   { background: var(--ok-bg);   color: var(--ok); }
  .badge.warn { background: var(--warn-bg); color: var(--warn); }
  .badge.err  { background: var(--error-bg);color: var(--error); }
  .badge.tappable {
    cursor: pointer; border: none; font-family: inherit;
    box-shadow: inset 0 0 0 1.5px var(--warn);
    -webkit-tap-highlight-color: transparent;
  }
  .badge.tappable:active { opacity: .7; }
  dl.duty { display: grid; grid-template-columns: auto 1fr; gap: 6px 14px; }
  dl.duty dt { color: var(--text-sub); font-size: .9rem; padding-top: 2px; white-space: nowrap; }
  dl.duty dd { font-weight: 600; }
  /* 外勤: 残り番との間に余白+固定高さの枠内でスクロール(カード高さを一定に保つ) */
  dl.duty dt.gaikin-t { margin-top: 12px; }
  dl.duty dd.gaikin {
    margin-top: 12px; font-weight: 500; font-size: .9rem; line-height: 1.7;
    height: 168px; overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  #day-pane { will-change: transform; }
  #today-body { min-height: 308px; }
  .empty-note { color: var(--text-sub); text-align: center; padding: 16px 0; }

  /* ── ② 週グリッド ── */
  .week-label { font-size: .85rem; color: var(--text-sub); font-weight: 600; margin: 10px 0 6px; }
  .week-label:first-of-type { margin-top: 0; }
  .week-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; }
  .day-cell {
    min-width: 0; min-height: 56px; padding: 4px 0;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface-2);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    font-size: .7rem; line-height: 1.3; text-align: center; color: var(--text-sub);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .day-cell:active { transform: scale(.96); }
  .day-cell .mark { font-size: 1rem; font-weight: 700; }
  .day-cell.filled { background: var(--surface); border-color: var(--accent); }
  .day-cell.filled .mark { color: var(--ok); }
  .day-cell.missing .mark { color: var(--warn); }
  .day-cell.today { outline: 2px solid var(--accent); outline-offset: 1px; }
  .legend { margin-top: 10px; font-size: .78rem; color: var(--text-sub); }

  /* ── ③ タイムライン ── */
  ul.timeline { list-style: none; display: grid; gap: 0; }
  ul.timeline li {
    display: grid; grid-template-columns: auto 1fr; gap: 2px 10px;
    padding: 9px 2px; border-bottom: 1px solid var(--border);
    font-size: .88rem; align-items: baseline;
  }
  ul.timeline li > span:last-child { grid-column: 1 / -1; }
  ul.timeline li:last-child { border-bottom: none; }
  .log-time { color: var(--text-sub); font-size: .8rem; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .log-level { font-weight: 700; white-space: nowrap; }
  .log-level.配信, .log-level.成功, .log-level.確認 { color: var(--ok); }
  .log-level.警告, .log-level.編集 { color: var(--warn); }
  .log-level.エラー { color: var(--error); }

  /* ── ボトムシート(詳細・編集) ── */
  .sheet-backdrop {
    position: fixed; inset: 0; background: rgb(0 0 0 / .45);
    opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 20;
  }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 21;
    max-width: 640px; margin: 0 auto;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -8px 30px rgb(0 0 0 / .25);
    padding: 12px 20px calc(24px + env(safe-area-inset-bottom));
    transform: translateY(105%); transition: transform .25s ease;
    max-height: 85vh; overflow-y: auto;
  }
  body.sheet-open .sheet-backdrop { opacity: 1; pointer-events: auto; }
  body.sheet-open .sheet { transform: translateY(0); }
  .sheet .grip { width: 40px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 14px; }
  .sheet h3 { font-size: 1.15rem; margin-bottom: 14px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: .82rem; color: var(--text-sub); font-weight: 600; margin-bottom: 4px; }
  .field input {
    width: 100%; min-height: 44px;
    font-size: 16px; font-family: inherit;
    color: var(--text); background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px;
  }
  .field input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .field textarea {
    width: 100%; min-height: 96px; resize: vertical;
    font-size: 16px; font-family: inherit; line-height: 1.6;
    color: var(--text); background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px;
  }
  .field textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .zanban-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .sheet-actions { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin-top: 18px; }
  button {
    min-height: 48px; font-size: 1rem; font-weight: 700; font-family: inherit;
    border: none; border-radius: 12px; cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  @media (prefers-color-scheme: dark) { .btn-primary { color: #042f2e; } }
  .btn-ghost { background: var(--surface-2); color: var(--text); }
  button:active { opacity: .8; }

  /* ── トースト ── */
  #toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--bg);
    padding: 10px 20px; border-radius: 999px; font-size: .9rem; font-weight: 600;
    opacity: 0; transition: all .25s; z-index: 30; pointer-events: none;
    max-width: 90vw;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>整形当番bot</h1>
  <div class="header-right">
    <button type="button" class="icon-btn" id="btn-refresh" aria-label="最新の情報に更新">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/>
      </svg>
    </button>
    <span class="health" id="health"><span class="dot"></span><span id="health-label">確認中…</span></span>
  </div>
</header>

<main>
  <!-- ① 今日カード(スワイプ/矢印で前後の日へ) -->
  <section class="card" aria-labelledby="today-h" id="today-card">
    <div class="card-title-row">
      <h2 id="today-h">今日の担当</h2>
      <button type="button" class="badge warn" id="deliver-badge" disabled style="display:none">確認中…</button>
      <button type="button" class="back-today" id="btn-today" style="display:none">今日に戻る</button>
    </div>
    <div id="day-pane">
      <div class="today-head">
        <div class="day-nav">
          <button type="button" class="nav-arrow" id="btn-prev" aria-label="前の日を表示">‹</button>
          <span class="today-date" id="today-date">–/–</span>
          <button type="button" class="nav-arrow" id="btn-next" aria-label="次の日を表示">›</button>
        </div>
        <span class="reg-badge" id="reg-badge" style="display:none"></span>
      </div>
      <div id="today-body"><p class="empty-note">読み込み中…</p></div>
    </div>
  </section>

  <!-- ② 週の取込状況 -->
  <section class="card" aria-labelledby="weeks-h">
    <h2 id="weeks-h">週の取込状況</h2>
    <div class="week-label">今週</div>
    <div class="week-grid" id="grid-this"></div>
    <div class="week-label">来週</div>
    <div class="week-grid" id="grid-next"></div>
    <p class="legend">✓ 登録済み ／ ⚠ 未登録 — 日付をタップすると詳細・修正ができます</p>
  </section>

  <!-- ③ 最近の出来事 -->
  <section class="card" aria-labelledby="log-h">
    <h2 id="log-h">最近の出来事</h2>
    <ul class="timeline" id="timeline"><li><span class="log-time">–</span><span class="log-level"></span><span>読み込み中…</span></li></ul>
  </section>
</main>

<!-- ボトムシート -->
<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
  <div class="grip"></div>
  <h3 id="sheet-title">–</h3>
  <form id="edit-form">
    <div class="field"><label for="f-救急">救急(リハ診)</label><input id="f-救急" autocomplete="off"></div>
    <div class="zanban-row">
      <div class="field"><label for="f-AM院内">AM院内</label><input id="f-AM院内" autocomplete="off"></div>
      <div class="field"><label for="f-PM院内">PM院内</label><input id="f-PM院内" autocomplete="off"></div>
    </div>
    <div class="zanban-row">
      <div class="field"><label for="f-AM医連">AM医連</label><input id="f-AM医連" autocomplete="off"></div>
      <div class="field"><label for="f-PM医連">PM医連</label><input id="f-PM医連" autocomplete="off"></div>
    </div>
    <div class="zanban-row">
      <div class="field"><label for="f-残1">残り番 1st</label><input id="f-残1" autocomplete="off"></div>
      <div class="field"><label for="f-残2">残り番 2nd</label><input id="f-残2" autocomplete="off"></div>
    </div>
    <div class="field">
      <label for="f-外勤">外勤(1行に1件・例: 石川島ー磯崎。なければ空欄)</label>
      <textarea id="f-外勤" autocomplete="off"></textarea>
    </div>
    <div class="sheet-actions">
      <button type="button" class="btn-ghost" id="btn-cancel">閉じる</button>
      <button type="submit" class="btn-primary">この内容で保存</button>
    </div>
  </form>
</div>

<div id="toast" role="status"></div>

<script>
const TOKEN = new URLSearchParams(location.search).get("token") || "";
const WD = ["月","火","水","木","金","土","日"];
const FIELDS = ["救急","AM院内","PM院内","AM医連","PM医連"];
let schedule = {};
let editingDate = null;
let statusData = null;   // /api/status の最新結果
let dayOffset = 0;       // 今日カードに表示中の日(今日=0、翌日=+1…)
const OFFSET_MIN = -7, OFFSET_MAX = 13;

const $ = (id) => document.getElementById(id);
const iso = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const fmt = (s) => { const d = new Date(s + "T00:00:00"); return `${d.getMonth()+1}/${d.getDate()}(${WD[(d.getDay()+6)%7]})`; };

async function api(path, opts) {
  const sep = path.includes("?") ? "&" : "?";
  const res = await fetch(`${path}${sep}token=${encodeURIComponent(TOKEN)}`, opts);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function setHealth(ok, label) {
  const h = $("health");
  h.className = "health " + (ok ? "ok" : "error");
  $("health-label").textContent = label;
}

/* ── ① 今日カード(スワイプで日移動) ── */
function shiftDate(baseIso, off) {
  const d = new Date(baseIso + "T00:00:00");
  d.setDate(d.getDate() + off);
  return iso(d);
}

function offsetLabel(off) {
  if (off === 0)  return "今日の担当";
  if (off === 1)  return "明日の担当";
  if (off === -1) return "昨日の担当";
  return off > 0 ? `${off}日後の担当` : `${-off}日前の担当`;
}

function renderDay() {
  if (!statusData) return;
  const key = shiftDate(statusData.today, dayOffset);
  $("today-h").textContent = offsetLabel(dayOffset);
  $("today-date").textContent = fmt(key);
  const a = schedule[key];
  const badge = $("deliver-badge");
  const reg = $("reg-badge");
  const back = $("btn-today");
  badge.disabled = true;
  badge.onclick = null;

  // 登録状況チップ(日付の右): 登録済みは✓のみ、未登録は「⚠ 未登録」
  reg.style.display = "inline-flex";
  if (a) {
    reg.className = "reg-badge ok";
    reg.textContent = "✓";
    reg.setAttribute("aria-label", "登録済み");
    reg.title = "登録済み";
  } else {
    reg.className = "reg-badge warn";
    reg.textContent = "⚠ 未登録";
    reg.removeAttribute("aria-label");
    reg.title = "";
  }

  // タイトル行の右: 今日は配信バッジ、他の日は「今日に戻る」
  if (dayOffset === 0) {
    back.style.display = "none";
    if (statusData.delivered_today) {
      badge.style.display = "inline-flex";
      badge.className = "badge ok"; badge.textContent = "✓ 配信済み";
    } else if (a) {
      badge.style.display = "inline-flex";
      badge.className = "badge warn tappable";
      badge.textContent = "⚠ 未配信 — タップで配信";
      badge.disabled = false;
      badge.onclick = deliverNow;
    } else {
      badge.style.display = "none";  // 未登録は日付横のチップで伝わる
    }
  } else {
    badge.style.display = "none";
    back.style.display = "inline-flex";
  }
  const body = $("today-body");
  if (!a) {
    body.innerHTML = '<p class="empty-note">この日の予定は登録されていません</p>';
    return;
  }
  const z = a["残り番"] || ["未設定","未設定"];
  const g = a["外勤"] || [];
  body.innerHTML = `<dl class="duty">
    <dt>救急(リハ診)</dt><dd>${esc(a["救急"])}</dd>
    <dt>院内</dt><dd>AM ${esc(a["AM院内"])} → PM ${esc(a["PM院内"])}</dd>
    <dt>医連</dt><dd>AM ${esc(a["AM医連"])} → PM ${esc(a["PM医連"])}</dd>
    <dt>残り番</dt><dd>1st ${esc(z[0])} ／ 2nd ${esc(z[1])}</dd>
    <dt class="gaikin-t">外勤</dt><dd class="gaikin">${g.length ? g.map(esc).join("<br>") : "なし"}</dd>
  </dl>`;
}

/* ── 日の切り替え(スライドアニメーション付き) ── */
let animating = false;

function springBack() {
  const pane = $("day-pane");
  pane.style.transition = "transform .2s ease";
  pane.style.transform = "translateX(0)";
}

function swapDay(delta) {
  if (animating) return;
  const target = Math.min(OFFSET_MAX, Math.max(OFFSET_MIN, dayOffset + delta));
  if (target === dayOffset) { springBack(); return; }  // 端に到達 → 元の位置へ戻す
  animating = true;
  const pane = $("day-pane");
  const dir = delta > 0 ? -1 : 1;  // 翌日へ → 現在の内容は左へ抜ける
  pane.style.transition = "transform .15s ease-in, opacity .15s ease-in";
  pane.style.transform = `translateX(${dir * 72}px)`;
  pane.style.opacity = "0";
  setTimeout(() => {
    dayOffset = target;
    renderDay();
    pane.style.transition = "none";
    pane.style.transform = `translateX(${-dir * 72}px)`;
    void pane.offsetWidth;  // 反映を強制してから戻りのアニメーションへ
    pane.style.transition = "transform .18s ease-out, opacity .18s ease-out";
    pane.style.transform = "translateX(0)";
    pane.style.opacity = "1";
    setTimeout(() => { animating = false; pane.style.transition = "none"; }, 200);
  }, 150);
}

const esc = (s) => String(s ?? "未設定").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ── ② 週グリッド ── */
function renderWeeks(todayStr) {
  const today = new Date(todayStr + "T00:00:00");
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((today.getDay() + 6) % 7));
  buildGrid($("grid-this"), monday, todayStr);
  const nextMon = new Date(monday);
  nextMon.setDate(monday.getDate() + 7);
  buildGrid($("grid-next"), nextMon, todayStr);
}

function buildGrid(el, monday, todayStr) {
  el.innerHTML = "";
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const key = iso(d);
    const filled = !!schedule[key];
    const cell = document.createElement("button");
    cell.type = "button";
    cell.className = "day-cell " + (filled ? "filled" : "missing") + (key === todayStr ? " today" : "");
    cell.setAttribute("aria-label", `${fmt(key)} ${filled ? "登録済み" : "未登録"}`);
    cell.innerHTML = `<span>${d.getMonth()+1}/${d.getDate()}<br>${WD[i]}</span><span class="mark">${filled ? "✓" : "⚠"}</span>`;
    cell.addEventListener("click", () => openSheet(key));
    el.appendChild(cell);
  }
}

/* ── ③ タイムライン ── */
function renderLogs(logs) {
  const ul = $("timeline");
  if (!logs.length) {
    ul.innerHTML = '<li><span class="log-time">–</span><span class="log-level"></span><span>まだ記録がありません</span></li>';
    return;
  }
  ul.innerHTML = logs.map(l =>
    `<li><span class="log-time">${esc(l.time)}</span><span class="log-level ${esc(l.level)}">${esc(l.level)}</span><span>${esc(l.message)}</span></li>`
  ).join("");
}

/* ── ボトムシート ── */
function openSheet(date) {
  editingDate = date;
  $("sheet-title").textContent = fmt(date) + " の担当";
  const a = schedule[date] || {};
  const z = a["残り番"] || ["", ""];
  for (const f of FIELDS) $("f-" + f).value = a[f] || "";
  $("f-残1").value = z[0] || "";
  $("f-残2").value = z[1] || "";
  $("f-外勤").value = (a["外勤"] || []).join("\n");
  document.body.classList.add("sheet-open");
}

function closeSheet() {
  document.body.classList.remove("sheet-open");
  editingDate = null;
}

$("backdrop").addEventListener("click", closeSheet);
$("btn-cancel").addEventListener("click", closeSheet);

$("edit-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  if (!editingDate) return;
  if (!confirm(`${fmt(editingDate)} の担当をこの内容で保存します。よろしいですか?`)) return;
  const assignment = {};
  for (const f of FIELDS) assignment[f] = $("f-" + f).value.trim() || "未設定";
  assignment["残り番"] = [$("f-残1").value.trim() || "未設定", $("f-残2").value.trim() || "未設定"];
  assignment["外勤"] = $("f-外勤").value.split("\n").map(s => s.trim()).filter(Boolean);
  try {
    await api("/api/schedule", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ date: editingDate, assignment }),
    });
    schedule[editingDate] = assignment;
    closeSheet();
    toast("保存しました");
    load();
  } catch (err) {
    toast("保存に失敗しました: " + err.message);
  }
});

/* ── 今すぐ配信 ── */
async function deliverNow() {
  if (!confirm("医局グループ(group A)の全員に「本日の担当者」を今すぐ配信します。\nよろしいですか?")) return;
  const badge = $("deliver-badge");
  badge.disabled = true;
  badge.textContent = "配信中…";
  try {
    const res = await fetch(`/api/deliver?token=${encodeURIComponent(TOKEN)}`, { method: "POST" });
    const body = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
    toast("配信しました");
  } catch (err) {
    toast("配信に失敗しました: " + err.message);
  }
  load();
}

/* ── 読み込み ── */
async function load() {
  try {
    const [status, sched] = await Promise.all([api("/api/status"), api("/api/schedule")]);
    schedule = sched;
    statusData = status;
    setHealth(true, "稼働中");
    renderDay();
    renderWeeks(status.today);
    renderLogs(status.logs);
  } catch (err) {
    setHealth(false, "接続エラー");
    toast("データ取得に失敗しました");
  }
}

/* ── 日移動: 矢印・今日に戻る・スワイプ ── */
$("btn-prev").addEventListener("click", () => swapDay(-1));
$("btn-next").addEventListener("click", () => swapDay(1));
$("btn-today").addEventListener("click", () => swapDay(-dayOffset));

let touchX = null, touchY = null;
const todayCard = $("today-card");
todayCard.addEventListener("touchstart", (e) => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, { passive: true });
todayCard.addEventListener("touchmove", (e) => {
  if (touchX === null || animating) return;
  const dx = e.touches[0].clientX - touchX;
  const dy = e.touches[0].clientY - touchY;
  // 横方向の動きなら、指に少し追従してカード内容を動かす
  if (Math.abs(dx) > Math.abs(dy)) {
    $("day-pane").style.transition = "none";
    $("day-pane").style.transform = `translateX(${dx * 0.35}px)`;
  }
}, { passive: true });
todayCard.addEventListener("touchend", (e) => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  touchX = touchY = null;
  // 横方向のはっきりしたスワイプだけ日を切り替え(縦スクロールと区別)
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    swapDay(dx < 0 ? 1 : -1);
  } else {
    springBack();
  }
}, { passive: true });

/* ── 更新ボタン ── */
$("btn-refresh").addEventListener("click", async () => {
  const b = $("btn-refresh");
  if (b.classList.contains("spinning")) return;
  b.classList.add("spinning");
  await load();
  b.classList.remove("spinning");
  toast("最新の情報に更新しました");
});

load();
setInterval(load, 60000);
</script>
</body>
